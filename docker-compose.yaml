services:
  minio:
    image: minio/minio:latest
    container_name: biblioteca-minio
    ports:
      - "9000:9000"   # API S3 — usada pelo Spring para upload/download
      - "9001:9001"   # Console web — acesse em http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data: