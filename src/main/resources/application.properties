spring.application.name=biblioteca

# H2 — banco em memória
spring.datasource.url=jdbc:h2:mem:bibliotecadb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
# "validate" valida o schema mas não o cria — o Flyway cuida disso

# H2 Console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway — caminho dos scripts de migração
spring.flyway.locations=classpath:db/migration

# Swagger UI (acesse em http://localhost:8080/swagger-ui.html)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html